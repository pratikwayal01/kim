name: Build & Attach Binaries

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach binaries to (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: kim-linux-x86_64
          - os: ubuntu-24.04-arm
            artifact: kim-linux-arm64
          - os: macos-latest
            artifact: kim-macos-arm64
          - os: windows-latest
            artifact: kim-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build binary
        run: pyinstaller --onefile --name ${{ matrix.artifact }} kim.py

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ inputs.tag }} dist/${{ matrix.artifact }} --clobber
