name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # No external dependencies required, but install psutil for memory tests (optional)
        pip install psutil || true
    
    - name: Run basic tests
      run: python -m unittest discover -s tests -v
    
    - name: Run memory tests (optional)
      run: python test_kim_memory.py 2>&1 | head -20
      continue-on-error: true  # Memory test may fail due to missing psutil, but we don't want to block CI